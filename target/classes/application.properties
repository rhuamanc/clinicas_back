# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:farmacia;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── H2 Console ───────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JWT ──────────────────────────────────────────────────
# IMPORTANTE: Cambia este secret en producción (min 256 bits)
jwt.secret=c2VjcmV0LWtleS1mYXJtYWNpYS1jYW1iaWFyLWVuLXByb2R1Y2Npb24tMjAyNg==
# Expiración: 7 días en milisegundos (604800000 ms)
jwt.expiration=604800000

# ─── Logging ──────────────────────────────────────────────
logging.level.com.magm=INFO
logging.level.org.springframework.security=WARN
